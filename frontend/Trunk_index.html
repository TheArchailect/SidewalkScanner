<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>SidewalkScanner</title>
        <style>
            html,
            body {
                height: 100%;
                width: 100%;

            #bevy {

    <body>
        <!-- Tell Trunk to copy the assets directory -->
        

        <canvas id="bevy"></canvas>
    
<script type="module">
import init, * as bindings from '/renderer/point-cloud-wasm.js';
const wasm = await init({ module_or_path: '/renderer/point-cloud-wasm-bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));
